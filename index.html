<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masrivi - تواصل معنا</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 2rem;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    
    textarea {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ddd;
      font-size: 16px;
      resize: none;
      margin-bottom: 20px;
      font-family: inherit;
    }
    
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.3s;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
    
    .status.loading {
      display: block;
      background: #fff3cd;
      color: #856404;
    }
    
    footer {
      margin-top: 30px;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Masrivi</h1>
    <p class="subtitle">تواصل معنا</p>
    
    <form id="contactForm">
      <textarea 
        id="message" 
        placeholder="اكتب رسالتك هنا..." 
        rows="5"
        required
      ></textarea>
      
      <button type="submit" id="submitBtn">إرسال</button>
    </form>
    
    <div id="status" class="status"></div>
  </div>
  
  <footer>
    <p>© 2026 Masrivi. All rights reserved.</p>
  </footer>
  
  <script>
    const BOT_TOKEN = 'YOUR_BOT_TOKEN';
    const CHAT_ID = 'YOUR_CHAT_ID';
    
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const message = document.getElementById('message').value;
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      
      if (!message.trim()) return;
      
      btn.disabled = true;
      btn.textContent = 'جاري الإرسال...';
      status.className = 'status loading';
      status.textContent = 'جاري الإرسال...';
      
      try {
        const response = await fetch(
          `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: message
            })
          }
        );
        
        const result = await response.json();
        
        if (result.ok) {
          status.className = 'status success';
          status.textContent = '✅ تم إرسال رسالتك بنجاح!';
          document.getElementById('message').value = '';
        } else {
          status.className = 'status error';
          status.textContent = '❌ فشل الإرسال. تحقق من إعدادات البوت.';
        }
      } catch (error) {
        status.className = 'status error';
        status.textContent = '❌ خطأ في الاتصال بالخادم';
      }
      
      btn.disabled = false;
      btn.textContent = 'إرسال';
    });
  </script>
</body>
</html>
